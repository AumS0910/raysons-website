<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Raysons — Casting Sequence (test)</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
<style>
  :root{ --amber:#ff9b3d; --cream:#E8E0D5; --steel:#c9d2dc; --bg:#050403; }
  *{margin:0;box-sizing:border-box}
  html,body{background:var(--bg);color:#fff}
  /* ── tall scroll runway: 800vh (400 assembly + 400 bore) ── */
  .casting{position:relative;height:800vh;background:var(--bg)}
  .casting__stage{position:relative;width:100%;height:100vh;overflow:hidden;background:var(--bg)}
  #frame{position:absolute;inset:0;width:100%;height:100%;display:block;will-change:transform}
  .casting__video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}

  /* preloader */
  .pre{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:var(--bg);z-index:9;transition:opacity .6s}
  .pre.done{opacity:0;pointer-events:none}
  .pre__bar{width:min(280px,52vw);height:1px;background:rgba(255,255,255,.12);position:relative;overflow:hidden}
  .pre__bar i{position:absolute;inset:0;width:0;background:var(--amber);box-shadow:0 0 12px var(--amber)}
  .pre__pct{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;color:rgba(255,255,255,.6)}

  /* text overlays */
  .ov{position:absolute;z-index:5;pointer-events:none;opacity:0;transition:opacity .55s ease}
  .ov.show{opacity:1}
  .ov--bl{left:clamp(24px,5vw,72px);bottom:clamp(40px,9vh,90px)}
  .ov--cb{left:50%;bottom:clamp(48px,11vh,120px);transform:translateX(-50%);text-align:center}
  .ov--c{left:50%;top:50%;transform:translate(-50%,-50%);text-align:center}
  .mono{font-family:'JetBrains Mono',monospace;letter-spacing:.04em}
  .amber{color:var(--amber)}
  .l-mono-12{font-size:12px}
  .l-mono-13{font-size:13px}
  .corm-36{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:36px;color:var(--cream);line-height:1.05}
  .corm-it-28{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;font-size:28px;color:var(--steel)}
  .l1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(24px,3.5vw,44px);color:#E8E0D5;line-height:1.1}
  .l2{font-family:'DM Sans',sans-serif;font-weight:300;font-size:16px;color:#B8B0A8;margin-top:14px}
  @keyframes lookpulse{0%,100%{opacity:.6}50%{opacity:1}}
  .pulse{animation:lookpulse 2.4s ease-in-out infinite}

  /* darken-to-black overlay for the bore finale */
  .darken{position:absolute;inset:0;z-index:6;background:#050403;opacity:0;pointer-events:none}
  .finale{position:absolute;inset:0;z-index:7;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .8s ease;pointer-events:none}
  .finale.show{opacity:1}
  .finale .l2{opacity:0;transition:opacity .6s ease}
  .finale.show2 .l2{opacity:1}
</style>
</head>
<body>
<section class="casting" id="casting">
  <div class="casting__stage">
    <canvas id="frame"></canvas>
    <video class="casting__video" id="video" muted playsinline loop preload="metadata"></video>

    <!-- ASSEMBLY overlays -->
    <div class="ov ov--bl" id="ov-a1"><div class="mono amber l-mono-12">Five components.</div><div class="mono amber l-mono-12">One casting.</div></div>
    <div class="ov ov--bl" id="ov-a2"><div class="mono amber l-mono-12">Shell moulded.</div><div class="mono amber l-mono-12">SG Iron · IS 1865</div></div>
    <div class="ov ov--cb" id="ov-a3"><div class="corm-36">Hydraulic Valve Housing</div><div class="mono amber l-mono-13" style="margin-top:10px">CT8 · Grade 450/12</div></div>

    <!-- BORE overlays -->
    <div class="ov ov--c pulse" id="ov-b1"><div class="corm-it-28">Look inside.</div></div>
    <div class="darken" id="darken"></div>
    <div class="finale" id="finale">
      <div class="l1">Every machine has one.</div>
      <div class="l2">The part that holds everything together.</div>
    </div>

    <!-- preloader -->
    <div class="pre" id="pre">
      <div class="pre__bar"><i id="pre-bar"></i></div>
      <div class="pre__pct mono" id="pre-pct">000%</div>
    </div>
  </div>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

const FRAMES = 240;
const pad3 = n => String(n).padStart(3,'0');
const A_PATH = i => `/assembly-frames/ezgif-frame-${pad3(i+1)}.jpg`;
const B_PATH = i => `/bore-frames/ezgif-frame-${pad3(i+1)}.jpg`;
const A_VIDEO = '/videos/assembly.mp4';
const B_VIDEO = '/videos/bore.mp4';

const isMobile = () => window.innerWidth <= 1024 || ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
const isSlow = () => { const c = navigator.connection; return !!c && ['slow-2g','2g','3g'].includes(c.effectiveType); };

const canvas = document.getElementById('frame');
const ctx = canvas.getContext('2d', { alpha:false });
const video = document.getElementById('video');
const pre = document.getElementById('pre'), preBar = document.getElementById('pre-bar'), prePct = document.getElementById('pre-pct');

const assembly = new Array(FRAMES);
const bore = new Array(FRAMES);
let firstReady = false;

function sizeCanvas(){
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = innerWidth * dpr; canvas.height = innerHeight * dpr;
  canvas.style.width = innerWidth+'px'; canvas.style.height = innerHeight+'px';
}
sizeCanvas();

// cover-fit draw (per spec)
function draw(img){
  if(!img) return;
  ctx.fillStyle = '#050403'; ctx.fillRect(0,0,canvas.width,canvas.height);
  const scale = Math.max(canvas.width/img.width, canvas.height/img.height);
  const x = (canvas.width - img.width*scale)/2;
  const y = (canvas.height - img.height*scale)/2;
  ctx.drawImage(img, x, y, img.width*scale, img.height*scale);
}

// ── frame preloading: first 20 immediately, rest in chunks of 30 ──
// Source frames are 1080×1920 → 7.9 MB each decoded. Downscale on decode to keep
// memory sane (720×1280 ≈ 3.7 MB). Visually plenty for a cover-fit canvas.
const DECODE_W = 720;
async function loadOne(arr, i, path){
  try{
    const blob = await fetch(path(i)).then(r=>r.blob());
    arr[i] = await createImageBitmap(blob, { resizeWidth: DECODE_W, resizeQuality: 'high' });
  }catch(e){ /* leave undefined; renderer uses nearest available */ }
}
function nearest(arr, i){ for(let d=0; d<FRAMES; d++){ if(arr[(i-d+FRAMES)%FRAMES]) return arr[(i-d+FRAMES)%FRAMES]; if(arr[(i+d)%FRAMES]) return arr[(i+d)%FRAMES]; } return null; }

async function preload(){
  let loaded = 0; const total = FRAMES*2;
  const tick = ()=>{ const pct = Math.round(loaded/total*100); preBar.style.width = pct+'%'; prePct.textContent = String(pct).padStart(3,'0')+'%'; };
  // priority: first 20 of assembly
  await Promise.all(Array.from({length:20},(_,i)=>loadOne(assembly,i,A_PATH).then(()=>{loaded++;tick();})));
  firstReady = true; pre.classList.add('done');
  // background: remaining assembly + all bore, in chunks of 30
  const queue = [];
  for(let i=20;i<FRAMES;i++) queue.push(()=>loadOne(assembly,i,A_PATH));
  for(let i=0;i<FRAMES;i++)  queue.push(()=>loadOne(bore,i,B_PATH));
  for(let c=0;c<queue.length;c+=30){
    await Promise.all(queue.slice(c,c+30).map(fn=>fn().then(()=>{loaded++;tick();})));
  }
}

// ── overlay state by (phase, frame) ──
const els = {
  a1:document.getElementById('ov-a1'), a2:document.getElementById('ov-a2'), a3:document.getElementById('ov-a3'),
  b1:document.getElementById('ov-b1'), darken:document.getElementById('darken'), finale:document.getElementById('finale')
};
let finaleTimers = [];
function setOverlays(phase, f){
  const on = (el,c)=>el.classList.toggle('show', c);
  if(phase==='assembly'){
    on(els.a1, f>=20 && f<80);
    on(els.a2, f>=120 && f<180);
    on(els.a3, f>=220);
    on(els.b1, false); els.darken.style.opacity=0; els.finale.classList.remove('show','show2'); clearFinale();
  } else {
    on(els.a1,false); on(els.a2,false); on(els.a3,false);
    on(els.b1, f>=1 && f<60);
    // darken rgba(5,4,3,0)→0.7 across frames 180→239
    els.darken.style.opacity = String(Math.min(0.7, Math.max(0,(f-180)/(239-180))*0.7));
    if(f>=239) runFinale(); else { els.finale.classList.remove('show','show2'); clearFinale(); els.darken.style.opacity = String(Math.min(0.7,(f-180)/59*0.7)); }
  }
}
function clearFinale(){ finaleTimers.forEach(clearTimeout); finaleTimers=[]; }
let finaleRunning = false;
function runFinale(){
  els.darken.style.opacity = '1';
  if(finaleRunning) return; finaleRunning = true;
  finaleTimers.push(setTimeout(()=>els.finale.classList.add('show'), 800));
  finaleTimers.push(setTimeout(()=>els.finale.classList.add('show2'), 1400));
}

// ── DESKTOP: scroll-scrubbed canvas ──
function initDesktop(){
  let target = {phase:'assembly', frame:0}, lastDrawn = -1, lastPhase='';
  ScrollTrigger.create({
    trigger:'#casting', start:'top top', end:'bottom bottom', pin:'.casting__stage', scrub:0.5,
    onUpdate:(self)=>{
      const phase = self.progress < 0.5 ? 'assembly' : 'bore';
      const pp = self.progress < 0.5 ? self.progress*2 : (self.progress-0.5)*2;
      target = { phase, frame: Math.floor(pp*(FRAMES-1)) };
      setOverlays(phase, target.frame);
      if(phase!=='bore'){ finaleRunning=false; }
    }
  });
  (function loop(){
    requestAnimationFrame(loop);
    if(!firstReady) return;
    if(target.frame!==lastDrawn || target.phase!==lastPhase){
      const arr = target.phase==='assembly' ? assembly : bore;
      draw(arr[target.frame] || nearest(arr, target.frame));
      lastDrawn = target.frame; lastPhase = target.phase;
    }
  })();
  preload();
}

// ── MOBILE: video fallback, overlays via timeupdate ──
function initMobile(){
  canvas.style.display='none'; pre.classList.add('done');
  const v = video; v.style.display='block'; v.src = A_VIDEO;
  let phase = 'assembly';
  const io = new IntersectionObserver(es=>{ es.forEach(e=> e.intersectionRatio>=0.4 ? v.play().catch(()=>{}) : v.pause()); }, {threshold:[0,0.4,1]});
  io.observe(document.querySelector('.casting__stage'));
  v.addEventListener('timeupdate', ()=>{
    const f = Math.floor((v.currentTime/(v.duration||1))*(FRAMES-1));
    setOverlays(phase, f);
  });
  v.addEventListener('ended', ()=>{ if(phase==='assembly'){ phase='bore'; v.loop=false; v.src=B_VIDEO; v.play().catch(()=>{}); } });
}

// ── SLOW connection: static first frame only ──
function initSlow(){
  pre.classList.add('done');
  fetch(A_PATH(0)).then(r=>r.blob()).then(createImageBitmap).then(draw).catch(()=>{});
}

addEventListener('resize', ()=>{ sizeCanvas(); });

if(isSlow()) initSlow();
else if(isMobile()) initMobile();
else initDesktop();

window.__cs = { isMobile:isMobile(), isSlow:isSlow(), get ready(){return firstReady;} };
</script>
</body>
</html>
