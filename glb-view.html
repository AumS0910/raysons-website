<!DOCTYPE html><html><head><meta charset="utf-8"/><meta name="robots" content="noindex"/>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#23262b}#c{display:block}</style>
</head><body><canvas id="c"></canvas>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/examples/jsm/environments/RoomEnvironment.js';
const params=new URLSearchParams(location.search);
const model=params.get('model')||'6_6_2026';
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(1);renderer.setSize(1100,1100);
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.0;renderer.outputColorSpace=THREE.SRGBColorSpace;
const scene=new THREE.Scene();scene.background=new THREE.Color(0x23262b);
const pmrem=new THREE.PMREMGenerator(renderer);scene.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;
const camera=new THREE.PerspectiveCamera(40,1,0.01,100);
scene.add(new THREE.HemisphereLight(0xffffff,0x808080,1.1));
const k=new THREE.DirectionalLight(0xffffff,1.6);k.position.set(-3,5,4);scene.add(k);
const f=new THREE.DirectionalLight(0xffffff,0.9);f.position.set(4,1,3);scene.add(f);
let a=0.6;
new GLTFLoader().load('/models/'+model+'.glb',(g)=>{
  const root=g.scene;const box=new THREE.Box3().setFromObject(root);
  const size=box.getSize(new THREE.Vector3()),center=box.getCenter(new THREE.Vector3());
  const s=2.6/Math.max(size.x,size.y,size.z);root.scale.setScalar(s);root.position.sub(center.multiplyScalar(s));
  let tris=0,meshes=0;root.traverse(o=>{if(o.isMesh){meshes++;const gg=o.geometry;tris+=(gg.index?gg.index.count:gg.attributes.position.count)/3;}});
  window.__info={model,tris:Math.round(tris),meshes,size:[size.x.toFixed(2),size.y.toFixed(2),size.z.toFixed(2)]};
  scene.add(root);window.__loaded=true;
},undefined,e=>{window.__err=String(e);});
window.__a=v=>a=v;
(function loop(){requestAnimationFrame(loop);const r=4.0;camera.position.set(Math.sin(a)*r,1.4,Math.cos(a)*r);camera.lookAt(0,0,0);renderer.render(scene,camera);})();
</script></body></html>
